<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>课程笔记库 - NotesAI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/icons.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background-color: #F6F1E8;
            color: #1F2421;
            min-height: 100vh;
        }

        /* Color tokens */
        :root {
            --blue: #4A90D9;   --green: #4CAF82;  --yellow: #E5B53A;
            --orange: #E08A3C; --red: #D9534F;    --purple: #9B6FD0;
            --gray: #6B6B66;
        }

        nav {
            position: sticky; top: 0; z-index: 100;
            background: rgba(246, 241, 232, 0.9);
            backdrop-filter: blur(12px);
            padding: 1.2rem 3rem;
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid #E2D9C8;
        }
        .logo {
            font-family: 'DM Serif Display', serif;
            font-size: 1.4rem; font-weight: 700; color: #C8853F;
            text-decoration: none;
        }
        .nav-links { display: flex; gap: 2rem; list-style: none; }
        .nav-links a {
            color: #1F2421; text-decoration: none; font-weight: 500;
            font-size: 0.92rem; transition: color 0.2s;
        }
        .nav-links a:hover { color: #C8853F; }

        .container { max-width: 1280px; margin: 0 auto; padding: 2.5rem 3rem; }

        /* Header row */
        .page-head {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 2.5rem; gap: 1rem; flex-wrap: wrap;
        }
        .page-head h1 {
            font-family: 'DM Serif Display', serif;
            font-size: 2.2rem; font-weight: 700;
        }
        .head-actions { display: flex; gap: 0.8rem; align-items: center; }

        .search-box {
            position: relative; display: flex; align-items: center;
        }
        .search-box input {
            padding: 0.65rem 1rem 0.65rem 2.4rem;
            border: 1px solid #E2D9C8; border-radius: 0.7rem;
            background: #FFFFFF; font-size: 0.9rem; width: 220px;
            font-family: inherit; transition: all 0.2s;
        }
        .search-box input:focus { outline: none; border-color: #C8853F; width: 260px; }
        .search-box .icon {
            position: absolute; left: 0.8rem; color: #8A8A80; font-size: 0.9rem;
        }

        .btn-new {
            padding: 0.65rem 1.3rem; background: #C8853F; color: #FFFFFF;
            border: none; border-radius: 0.7rem; font-weight: 600;
            font-size: 0.9rem; cursor: pointer; transition: all 0.2s;
            white-space: nowrap;
        }
        .btn-new:hover { background: #A86B2C; transform: translateY(-2px); }

        /* Card grid */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 1.5rem;
        }

        .card {
            background: #FFFFFF;
            border: 1px solid #E2D9C8;
            border-radius: 1.1rem;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.22s ease;
            position: relative;
            display: flex; flex-direction: column;
        }
        .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 14px 36px rgba(31, 36, 33, 0.12);
        }
        .card-bar { height: 7px; width: 100%; }
        .card-body { padding: 1.4rem 1.5rem 1.5rem; flex: 1; }

        .card-title {
            font-size: 1.2rem; font-weight: 700; margin-bottom: 1rem;
            display: flex; align-items: center; gap: 0.5rem;
        }
        .card-dot {
            width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0;
        }

        .card-stats { display: flex; gap: 1.2rem; margin-bottom: 1rem; }
        .stat { font-size: 0.85rem; color: #5A5A52; }
        .stat .num { font-weight: 700; color: #1F2421; }

        .card-updated { font-size: 0.78rem; color: #A0A096; }

        /* Hover quick actions */
        .card-actions {
            position: absolute; top: 0.8rem; right: 0.8rem;
            display: flex; gap: 0.3rem; opacity: 0;
            transform: translateY(-4px); transition: all 0.2s;
        }
        .card:hover .card-actions { opacity: 1; transform: translateY(0); }
        .act-btn {
            width: 30px; height: 30px; border-radius: 0.5rem;
            background: rgba(255,255,255,0.95);
            border: 1px solid #E2D9C8;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; font-size: 0.85rem;
            box-shadow: 0 2px 6px rgba(0,0,0,0.06);
            transition: all 0.15s;
        }
        .act-btn:hover { background: #F0E3D0; border-color: #C8853F; }

        /* Empty state */
        .empty {
            text-align: center; padding: 6rem 2rem;
        }
        .empty .big-icon { font-size: 4rem; margin-bottom: 1.5rem; }
        .empty h2 {
            font-family: 'DM Serif Display', serif;
            font-size: 1.6rem; margin-bottom: 0.8rem;
        }
        .empty p { color: #8A8A80; margin-bottom: 2rem; }
        .empty .btn-new { font-size: 1rem; padding: 0.85rem 2rem; }

        /* Modal */
        .modal-overlay {
            display: none; position: fixed; inset: 0;
            background: rgba(31, 36, 33, 0.5); backdrop-filter: blur(4px);
            z-index: 1000; align-items: center; justify-content: center;
        }
        .modal-overlay.active { display: flex; }
        .modal {
            background: #FFFFFF; border-radius: 1.2rem; padding: 2rem;
            width: 90%; max-width: 440px;
            box-shadow: 0 20px 60px rgba(31,36,33,0.3);
        }
        .modal h3 {
            font-family: 'DM Serif Display', serif;
            font-size: 1.35rem; margin-bottom: 1.5rem;
        }
        .modal label {
            display: block; font-size: 0.85rem; font-weight: 600;
            margin-bottom: 0.5rem;
        }
        .modal input[type=text] {
            width: 100%; padding: 0.7rem 0.9rem; border: 2px solid #E2D9C8;
            border-radius: 0.6rem; font-size: 0.95rem; font-family: inherit;
            margin-bottom: 1.4rem;
        }
        .modal input[type=text]:focus { outline: none; border-color: #C8853F; }

        .color-picker { display: flex; gap: 0.6rem; margin-bottom: 1.8rem; flex-wrap: wrap; }
        .color-swatch {
            width: 34px; height: 34px; border-radius: 50%; cursor: pointer;
            border: 3px solid transparent; transition: all 0.15s;
        }
        .color-swatch.selected { border-color: #1F2421; transform: scale(1.1); }

        .modal-actions { display: flex; gap: 0.8rem; justify-content: flex-end; }
        .btn-cancel {
            padding: 0.65rem 1.3rem; background: #FBF7EF; color: #5A5A52;
            border: 1px solid #E2D9C8; border-radius: 0.6rem; cursor: pointer;
            font-weight: 600; font-size: 0.9rem;
        }
        .btn-confirm {
            padding: 0.65rem 1.3rem; background: #C8853F; color: #FFFFFF;
            border: none; border-radius: 0.6rem; cursor: pointer;
            font-weight: 600; font-size: 0.9rem;
        }
        .btn-confirm:hover { background: #A86B2C; }

        @media (max-width: 640px) {
            .container { padding: 1.5rem; }
            nav { padding: 1rem 1.5rem; }
            .grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <nav>
        <a href="/" class="logo">NotesAI</a>
        <ul class="nav-links">
            <li><a href="/">首页</a></li>
            <li><a href="/library">课程笔记库</a></li>
            <li><a href="/workspace">创建新笔记</a></li>
        </ul>
    </nav>

    <div class="container">
        <div class="page-head">
            <h1>我的课程</h1>
            <div class="head-actions">
                <div class="search-box">
                    <span class="icon" data-icon="search" data-icon-size="16"></span>
                    <input type="text" id="searchInput" placeholder="搜索课程...">
                </div>
                <button class="btn-new with-ic" onclick="openCreateModal()"><span data-icon="plus" data-icon-size="16"></span> 新建课程</button>
            </div>
        </div>

        <div id="gridArea"></div>
    </div>

    <!-- Create/Rename Modal -->
    <div class="modal-overlay" id="courseModal">
        <div class="modal">
            <h3 id="modalTitle">新建课程</h3>
            <label>课程名称</label>
            <input type="text" id="courseName" placeholder="例如：现代汉语">
            <label>课程颜色</label>
            <div class="color-picker" id="colorPicker"></div>
            <div class="modal-actions">
                <button class="btn-cancel" onclick="closeModal()">取消</button>
                <button class="btn-confirm" id="modalConfirm">创建</button>
            </div>
        </div>
    </div>

    <script src="/static/icons.js"></script>
    <script src="/static/library.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>课程主页 - NotesAI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/icons.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background-color: #F6F1E8; color: #1F2421; min-height: 100vh;
        }

        nav {
            position: sticky; top: 0; z-index: 100;
            background: rgba(246, 241, 232, 0.9); backdrop-filter: blur(12px);
            padding: 1.2rem 3rem; display: flex; justify-content: space-between;
            align-items: center; border-bottom: 1px solid #E2D9C8;
        }
        .logo {
            font-family: 'DM Serif Display', serif; font-size: 1.4rem;
            font-weight: 700; color: #C8853F; text-decoration: none;
        }
        .nav-links { display: flex; gap: 2rem; list-style: none; }
        .nav-links a {
            color: #1F2421; text-decoration: none; font-weight: 500;
            font-size: 0.92rem; transition: color 0.2s;
        }
        .nav-links a:hover { color: #C8853F; }

        .container { max-width: 1100px; margin: 0 auto; padding: 2rem 3rem 4rem; }

        .back-btn {
            display: inline-block; margin-bottom: 1rem; padding: 0.45rem 1rem;
            background: #FFFFFF; border: 1px solid #E2D9C8; border-radius: 0.6rem;
            color: #5A5A52; text-decoration: none; font-size: 0.85rem; font-weight: 500;
            transition: all 0.18s;
        }
        .back-btn:hover { background: #F0E3D0; border-color: #C8853F; color: #C8853F; transform: translateX(-2px); }

        .section-label { font-weight: 700; font-size: 1.1rem; margin-bottom: 0.8rem; }

        .breadcrumb { font-size: 0.85rem; color: #8A8A80; margin-bottom: 1rem; }
        .breadcrumb a { color: #8A8A80; text-decoration: none; }
        .breadcrumb a:hover { color: #C8853F; }

        .course-head { display: flex; align-items: center; gap: 0.8rem; margin-bottom: 2rem; }
        .course-bar { width: 6px; height: 40px; border-radius: 3px; }
        .course-head h1 { font-family: 'DM Serif Display', serif; font-size: 2.2rem; }

        /* Tabs */
        .tabs {
            display: flex; gap: 0.4rem; border-bottom: 2px solid #E2D9C8;
            margin-bottom: 2rem; flex-wrap: wrap;
        }
        .tab {
            padding: 0.7rem 1.2rem; cursor: pointer; font-size: 0.92rem;
            font-weight: 500; color: #8A8A80; border-bottom: 3px solid transparent;
            margin-bottom: -2px; transition: all 0.2s;
        }
        .tab:hover { color: #C8853F; }
        .tab.active { color: #C8853F; border-bottom-color: #C8853F; font-weight: 600; }

        .pane { display: none; }
        .pane.active { display: block; }

        /* Session list */
        .session-row {
            background: #FFFFFF; border: 1px solid #E2D9C8; border-radius: 0.8rem;
            padding: 1rem 1.3rem; margin-bottom: 0.8rem; display: flex;
            justify-content: space-between; align-items: center; cursor: pointer;
            transition: all 0.18s;
        }
        .session-row:hover { box-shadow: 0 6px 18px rgba(31,36,33,0.08); transform: translateY(-2px); }
        .session-row.hidden-row { opacity: 0.5; }
        .session-row.selected { border-color: #C8853F; box-shadow: 0 6px 18px rgba(200,133,63,0.18); }
        .hidden-divider { font-size: 0.78rem; color: #A0A096; margin: 1rem 0 0.6rem; text-align: center; }
        .session-info .title { font-weight: 600; margin-bottom: 0.3rem; }
        /* 鼠标靠近可重命名的标题输入框 */
        .title-edit {
            font: inherit; font-weight: 600; color: #1F2421; border: 1px solid transparent;
            background: transparent; border-radius: 0.35rem; padding: 0.1rem 0.35rem;
            width: 100%; max-width: 360px; margin-bottom: 0.3rem; transition: all 0.15s;
        }
        .session-row:hover .title-edit { border-color: #E2D9C8; background: #FBF7EF; }
        .title-edit:focus { outline: none; border-color: #C8853F; background: #fff; }
        .session-info .time { font-size: 0.8rem; color: #A0A096; }
        .session-acts { display: flex; gap: 0.6rem; align-items: center; }
        .icon-btn {
            width: 32px; height: 32px; border-radius: 0.5rem; border: 1px solid #E2D9C8;
            background: #FBF7EF; cursor: pointer; display: flex; align-items: center;
            justify-content: center; font-size: 0.9rem; transition: all 0.15s; color: #8A6A43;
        }
        .icon-btn:hover { background: #F0E3D0; border-color: #C8853F; }
        .icon-btn.danger:hover { background: #FBE3E1; border-color: #D9534F; color: #D9534F; }

        /* 选中资料后底部内联预览提示 */
        .preview-hint {
            font-size: 0.82rem; color: #C8853F; background: #FBF3E6; border: 1px dashed #E0C49A;
            border-radius: 0.6rem; padding: 0.6rem 1rem; margin-bottom: 1rem;
            display: flex; align-items: center; gap: 0.5rem;
        }
        .enter-edit-btn {
            margin-left: auto; padding: 0.4rem 0.9rem; background: #C8853F; color: #fff;
            border: none; border-radius: 0.5rem; cursor: pointer; font-size: 0.82rem; font-weight: 600;
            display: inline-flex; align-items: center; gap: 0.4rem;
        }
        .enter-edit-btn:hover { background: #A86B2C; }

        /* Markdown content */
        .md-content { background: #FFFFFF; border: 1px solid #E2D9C8; border-radius: 1rem; padding: 2rem; line-height: 1.8; }
        .md-content h1 { font-family: 'DM Serif Display', serif; font-size: 1.8rem; border-bottom: 2px solid #E2D9C8; padding-bottom: 0.6rem; margin: 1.2rem 0 1rem; }
        .md-content h2 { font-family: 'DM Serif Display', serif; font-size: 1.4rem; margin: 1.2rem 0 0.8rem; }
        .md-content h3 { font-size: 1.15rem; margin: 1rem 0 0.6rem; }
        .md-content blockquote { background: #FBF7EF; border-left: 4px solid #C8853F; padding: 0.8rem 1.2rem; margin: 0.8rem 0; border-radius: 0.4rem; }
        .md-content code { background: #FBF7EF; padding: 0.15rem 0.4rem; border-radius: 0.3rem; font-family: Consolas, monospace; }
        /* 考试重点高亮块 */
        .md-content blockquote.exam-key {
            background: #FCEEE6; border-left: 4px solid #C8853F; position: relative;
            padding-left: 1.2rem;
        }
        .md-content blockquote.exam-key::before {
            content: "★ 考试重点"; display: inline-block; font-size: 0.72rem; font-weight: 700;
            color: #fff; background: #C8853F; padding: 0.1rem 0.5rem; border-radius: 0.3rem;
            margin-bottom: 0.4rem;
        }

        /* Mindmap */
        .mindmap-toolbar { display: flex; gap: 0.6rem; margin-bottom: 1rem; }
        .export-btn {
            padding: 0.6rem 1.1rem; background: #FFFFFF; border: 1px solid #E2D9C8;
            border-radius: 0.6rem; cursor: pointer; font-size: 0.85rem; font-weight: 500;
            transition: all 0.15s; display: flex; align-items: center; gap: 0.4rem;
        }
        .export-btn:hover { background: #F0E3D0; border-color: #C8853F; }
        .mindmap-box { background: #FBF7EF; border: 1px solid #E2D9C8; border-radius: 1rem; height: 560px; }
        #mindmap-svg { width: 100%; height: 100%; }

        /* Material grid */
        .mat-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px,1fr)); gap: 1rem; }
        .mat-card {
            background: #FFFFFF; border: 1px solid #E2D9C8; border-radius: 0.8rem;
            padding: 1.2rem; text-align: center; position: relative; cursor: pointer;
            transition: all 0.18s;
        }
        .mat-card:hover { box-shadow: 0 6px 18px rgba(31,36,33,0.08); transform: translateY(-2px); }
        .mat-card.hidden-item { opacity: 0.45; }
        .mat-icon { font-size: 2rem; margin-bottom: 0.6rem; color: #8A6A43; }
        .mat-icon .ic { width: 34px; height: 34px; }
        .mat-name { font-size: 0.85rem; word-break: break-all; color: #5A5A52; }
        .mat-del {
            position: absolute; top: 0.5rem; right: 0.5rem; cursor: pointer;
            width: 26px; height: 26px; border-radius: 0.4rem; display: none;
            align-items: center; justify-content: center; color: #8A6A43;
            background: rgba(255,255,255,0.95); border: 1px solid #E2D9C8;
        }
        .mat-card:hover .mat-del { display: flex; }
        .mat-del:hover { background: #FBE3E1; border-color: #D9534F; color: #D9534F; }
        .mat-sub { font-size: 0.72rem; color: #A0A096; margin-top: 0.3rem; }

        .empty-mini { text-align: center; padding: 4rem 2rem; color: #8A8A80; }
        .empty-mini .ico { font-size: 3rem; margin-bottom: 1rem; }

        .batch-bar {
            display: none; gap: 0.8rem; align-items: center; margin-bottom: 1rem;
            padding: 0.8rem 1.2rem; background: #F0E3D0; border-radius: 0.7rem;
        }
        .batch-bar.active { display: flex; }
        .btn-danger {
            padding: 0.5rem 1.1rem; background: #D9534F; color: #fff; border: none;
            border-radius: 0.5rem; cursor: pointer; font-size: 0.85rem; font-weight: 600;
        }
        .chat-log { background:#FFFFFF; border:1px solid #E2D9C8; border-radius:1rem; padding:1.5rem; }
        .chat-msg { padding:0.7rem 1rem; border-radius:0.7rem; margin-bottom:0.7rem; max-width:85%; }
        .chat-msg.user { background:#C8853F; color:#fff; margin-left:auto; }
        .chat-msg.ai { background:#FBF7EF; border:1px solid #E2D9C8; }

        @media (max-width: 640px) { .container { padding: 1.5rem; } nav { padding: 1rem 1.5rem; } }

        /* 预览弹窗 */
        .preview-modal {
            display: none; position: fixed; inset: 0; z-index: 500;
            background: rgba(31,36,33,0.55); backdrop-filter: blur(4px);
            align-items: center; justify-content: center; padding: 2rem;
        }
        .preview-modal.active { display: flex; }
        .preview-dialog {
            background: #fff; border-radius: 1rem; width: min(960px, 95vw);
            height: min(85vh, 900px); display: flex; flex-direction: column;
            overflow: hidden; box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .preview-modal-head {
            display: flex; justify-content: space-between; align-items: center;
            padding: 0.9rem 1.3rem; border-bottom: 1px solid #E2D9C8; font-weight: 600;
        }
        .preview-close { cursor: pointer; color: #8A8A80; font-size: 1.1rem; }
        .preview-close:hover { color: #C8853F; }
        .preview-modal-body { flex: 1; overflow: auto; background: #F6F1E8; }
        .preview-modal-body iframe { width: 100%; height: 100%; border: none; }
        .preview-modal-body img { max-width: 100%; display: block; margin: 0 auto; }
        .preview-modal-body audio { width: 90%; margin: 2rem auto; display: block; }
        .preview-modal-body .md-text { padding: 2rem; line-height: 1.8; }
        .preview-loading { padding: 3rem; text-align: center; color: #8A8A80; }
    </style>
</head>
<body>
    <nav>
        <a href="/" class="logo">NotesAI</a>
        <ul class="nav-links">
            <li><a href="/">首页</a></li>
            <li><a href="/library">课程笔记库</a></li>
            <li><a href="/workspace">创建新笔记</a></li>
        </ul>
    </nav>

    <div class="container">
        <a href="/library" class="back-btn with-ic"><span data-icon="back" data-icon-size="16"></span> 返回课程笔记库</a>
        <div class="breadcrumb"><a href="/library">课程笔记库</a> / <span id="bcName">课程</span></div>
        <div class="course-head">
            <div class="course-bar" id="courseBar"></div>
            <h1 id="courseTitle">加载中…</h1>
        </div>

        <div class="tabs">
            <div class="tab active with-ic" data-tab="summary"><span data-icon="summary" data-icon-size="16"></span> 课程总结</div>
            <div class="tab with-ic" data-tab="materials"><span data-icon="folder" data-icon-size="16"></span> 课堂资料</div>
        </div>

        <!-- 课程总结：会话列表 + 选中内容 + 思维导图 -->
        <div class="pane active" id="summary-pane">
            <div class="batch-bar" id="batchBar">
                <label><input type="checkbox" id="selectAll"> 全选</label>
                <span id="selCount">已选 0 项</span>
                <button class="btn-danger" onclick="batchDelete()">批量删除</button>
            </div>
            <div id="sessionList"></div>
            <div id="summaryContent" style="margin-top:1.5rem;"></div>

            <!-- 思维导图（整合进课程总结） -->
            <div id="mindmapSection" style="margin-top:2rem; display:none;">
                <div class="section-label with-ic"><span data-icon="mindmap" data-icon-size="18"></span> 思维导图</div>
                <div class="mindmap-toolbar">
                    <button class="export-btn with-ic" onclick="exportMindmap('png')"><span data-icon="download" data-icon-size="15"></span> 导出 PNG</button>
                    <button class="export-btn with-ic" onclick="exportMindmap('jpg')"><span data-icon="download" data-icon-size="15"></span> 导出 JPG</button>
                    <button class="export-btn with-ic" onclick="exportMindmap('pdf')"><span data-icon="download" data-icon-size="15"></span> 导出 PDF</button>
                </div>
                <div class="mindmap-box"><svg id="mindmap-svg"></svg></div>
            </div>
        </div>

        <!-- 课堂资料 -->
        <div class="pane" id="materials-pane"></div>
    </div>

    <!-- 资料预览弹窗 -->
    <div class="preview-modal" id="previewModal" onclick="closePreview(event)">
        <div class="preview-dialog" onclick="event.stopPropagation()">
            <div class="preview-modal-head">
                <span id="previewTitle">预览</span>
                <span class="preview-close" onclick="closePreview()" data-icon="close" data-icon-size="18"></span>
            </div>
            <div class="preview-modal-body" id="previewBody"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
    <script src="https://cdn.jsdelivr.net/npm/markmap-view"></script>
    <script src="https://cdn.jsdelivr.net/npm/markmap-lib"></script>
    <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/docx-preview@0.3.2/dist/docx-preview.min.js"></script>
    <script src="/static/icons.js"></script>
    <script src="/static/docpreview.js"></script>
    <script src="/static/course.js"></script>
</body>
</html>
